on:
  push:
    tags:
      - "types@*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install dependencies
        run: bun i --frozen-lockfile

      - name: Build types
        run: bun run scripts/genTypes --npm

      - name: Publish package
        run: npm publish ./types --provenance